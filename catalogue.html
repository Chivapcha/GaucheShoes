<!DOCTYPE html>
<html>
    <head>
        <title>GaucheShoes</title>
        <link rel="stylesheet" href="style.css">
        <!-- Un source afin de pouvoir insérer les petites icones -->
        <!-- ELIOT DIS-MOI SI CA MARCHE POUR TOI STP jsp si ça marche que sur mon pc ou pas, les icones sur les boutons avec le compte etc -->
        <script src="https://kit.fontawesome.com/d9ab49de50.js" crossorigin="anonymous"></script>
    </head>
    <body>
            <header>
                <!-- les éléments du haut de la page : titre/logo, liens vers le catalogue,
                 panier, profil et le bouton pour passer aux chaussures droites -->
                <p id="titre"><b>GaucheShoes</b></p>
                <div class="boutons">
                    <button type="button" id="cat" class="sansFond">Catalogue</button>
                    <button type="button" id="panier" class="sansFond"><i class="fas fa-cart-shopping"></i></button>
                    <button type="button" id="profil" class="sansFond"><i class="fas fa-user"></i></button>
                    <button type="button" class="avecFond" id="changeCote"><i class="fa-solid fa-arrow-right-arrow-left"></i> Passer à droite</button>
                </div> 
            </header>
            <div class="content">
                <!-- le contenu du catalogue : description et la grille avec les articles -->
                <div class="description">
                    <h1>Notre collection gauche</h1>
                    <p>Découvrez notre sélection exclusive de chaussures gauches premium</p><br>
                </div>
                <div class="container">
                    <!-- REVOIR, il faudra ajouter une case avec la photo en haut et du texte en bas + place pour le bouton -->
                    <img src="img/default.jpg" alt="DefaultBoots">
                    <img src="img/default.jpg" alt="DefaultBoots">
                    <img src="img/default.jpg" alt="DefaultBoots">
                    <img src="img/default.jpg" alt="DefaultBoots">
                    <img src="img/default.jpg" alt="DefaultBoots">
                    <img src="img/default.jpg" alt="DefaultBoots">
                </div>
                <!-- GRILLE : A FAIRE -->
            </div>
    </body>
</html>

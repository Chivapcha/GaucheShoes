<!DOCTYPE html>
<html>
    <head>
        <title>GaucheShoes</title>
        <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
        <link rel="stylesheet" href="style.css">
        <!-- Un source afin de pouvoir insérer les petites icones -->
        <!-- ELIOT DIS-MOI SI CA MARCHE POUR TOI STP jsp si ça marche que sur mon pc ou pas, les icones sur les boutons avec le compte etc -->
        <script src="https://kit.fontawesome.com/d9ab49de50.js" crossorigin="anonymous"></script>
    </head>
    <body>
            <header>
                <!-- les éléments du haut de la page : titre/logo, liens vers le catalogue,
                 panier, profil et le bouton pour passer aux chaussures droites -->
                <p id="titre"><b>GaucheShoes</b></p>
                <div class="boutons">
                    <a href="catalogue.html"><button id="cat" class="sansFond">Catalogue</button></a>
                    <button onclick="ouvrirPanier()" class="sansFond"><i class="fas fa-cart-shopping"></i></button>
                    <button onclick="ouvrirCompte()" class="sansFond"><i class="fas fa-user"></i></button>
                    <button type="button" class="avecFond" id="changeCote" onclick="switchCote()">
                        <i class="fa-solid fa-arrow-right-arrow-left"></i> Passer à droite</button>
                </div> 
            </header>
            <div class="content">
                <!-- le contenu du catalogue : description et la grille avec les articles -->
                <div class="description">
                    <h1>Notre collection gauche</h1>
                    <p>Découvrez notre sélection exclusive de chaussures gauches premium</p><br>
                </div>

                <div class="container" id="catalogueContainer">
                    <!-- Le code est genere par le JS dans script.js -->
                    <div class="loading">Chargement du catalogue...</div>
                </div>
            </div>
            <div class="panierPopup" id = "panier">
                <div class="panierContainer">
                    <div class="panierHeader">
                        <h1 class="panierTitre">Mon Panier</h1>
                        <button onclick="fermerPanier()" class="btnFermer"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="panierBody">
                        <div class="panierContenu">
                            <p>Panier vide</p>
                        </div>
                        <div class="panierAside">
                            <h2>Récapitulatif</h2>
                            <p>Sous-total : <span class="sousTotal">0.00 €</span></p>
                            <p>Livraison : <span class="livraison">0.00 €</span></p>
                            <br><hr><br>
                            <h2>Total : <span class="total">0.00 €</span></h2>
                            <button class="avecFond" id="passerCommande">Passer la commande</button>
                        </div>
                    </div>
                    
                </div>
            </div>

            <div class="comptePopup" id = "compte">
                <div class="compteContainer">
                    <div class="compteHeader">
                        <h1 class="compteTitre">Mon Compte</h1>
                        <button onclick="fermerCompte()" class="btnFermer"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="compteBody">
                        <div class="compteContenu">
                            <div class="accederCompte">
                                <div class="ligneForm">
                                    <label for="email">Email : </label>
                                    <input type="email" id = "email"><br><br>
                                </div>
                                <div class="ligneForm">
                                    <label for="password">Mot de passe : </label>
                                    <input type="password" id = "password">
                                </div>
                                <button class="avecFond" id="boutonAccederCompte">Accéder à mon compte</button>
                            </div>
                        </div>
                        <div class="compteAside">
                            <button class="avecFond" id="historique">Historique de mes commandes</button>
                            <!-- ANIMATION DE L'APPUI NE MARCHE PAS -->
                        </div>
                    </div>
                    
                </div>
            </div>
            <script src="script.js"></script>
    </body>
</html>
